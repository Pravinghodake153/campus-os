services:
  postgres:
    image: postgres:16-alpine
    container_name: campusos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: campusos
      POSTGRES_PASSWORD: campusos123
      POSTGRES_DB: campusos_dev
    volumes:
      - campusos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusos -d campusos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campusos_pgdata:
    driver: local
