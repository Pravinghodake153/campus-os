services:
  # 1. Node.js API Service
  - type: web
    name: campusos-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @campusos/api prisma:generate && pnpm --filter @campusos/api build
    startCommand: pnpm db:push && pnpm db:seed && pnpm --filter @campusos/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusos-db
          property: connectionString
      - key: JWT_SECRET
        value: campusos_hackathon_secret_2026

  # 2. Python AI Service
  - type: web
    name: campusos-ai-service
    runtime: python
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

  # 3. Next.js Frontend Admin Web App
  - type: web
    name: campusos-admin-web
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @campusos/admin-web build
    startCommand: pnpm --filter @campusos/admin-web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://campusos-api.onrender.com # Change this to your deployed API service URL

# 4. PostgreSQL Database
databases:
  - name: campusos-db
    databaseName: campusos
    user: campusos
