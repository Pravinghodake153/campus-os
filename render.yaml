services:
  # 1. Node.js API Service
  - type: web
    name: campusos-api
    env: node
    rootDir: apps/api
    buildCommand: pnpm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusos-db
          property: connectionString
      - key: JWT_SECRET
        value: campusos_hackathon_secret_2026

  # 2. Python AI Service
  - type: web
    name: campusos-ai-service
    env: python
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

# 3. PostgreSQL Database
databases:
  - name: campusos-db
    databaseName: campusos
    user: campusos
